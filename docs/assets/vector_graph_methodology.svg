<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Skill vector space and inferred pathway graph methodology</title>
  <desc id="desc">Conceptual 3D illustration of a high-dimensional skill vector space with a translucent grid, many role vectors, nearest-neighbour discovery, suitability re-ranking, and inferred role graph edges.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#15803d" />
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1100" height="760" fill="#f8fafc" />
  <text x="550" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Vector Space + Inferred Pathway Graph</text>
  <text x="550" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Conceptual 3D view. The real dataset vector has 2,316 skill dimensions; this diagram shows 3 example dimensions for readability.</text>

  <g transform="translate(60,116)">
    <rect x="0" y="0" width="650" height="525" rx="10" fill="#ffffff" stroke="#cbd5e1" filter="url(#soft-shadow)" />
    <text x="325" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Sparse Skill Vector Space</text>
    <text x="325" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Each point is a user or role vector: skill dimension -&gt; proficiency level.</text>

    <g transform="translate(72,86)">
      <line x1="78" y1="340" x2="500" y2="340" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-blue)" />
      <line x1="78" y1="340" x2="78" y2="36" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-blue)" />
      <line x1="78" y1="340" x2="250" y2="205" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-blue)" />

      <text x="512" y="345" font-family="Arial, sans-serif" font-size="12" fill="#334155">Programming</text>
      <text x="20" y="34" font-family="Arial, sans-serif" font-size="12" fill="#334155">Analytics</text>
      <text x="210" y="198" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#334155">Data Governance</text>

      <g opacity="0.72" stroke="#bae6fd" stroke-width="1">
        <path d="M130 296 L410 296 L512 220 L232 220 Z" fill="#e0f2fe" fill-opacity="0.28" />
        <path d="M130 252 L410 252 L512 176 L232 176 Z" fill="none" />
        <path d="M130 208 L410 208 L512 132 L232 132 Z" fill="none" />
        <path d="M130 164 L410 164 L512 88 L232 88 Z" fill="none" />
        <line x1="130" y1="296" x2="130" y2="164" />
        <line x1="200" y1="296" x2="200" y2="164" />
        <line x1="270" y1="296" x2="270" y2="164" />
        <line x1="340" y1="296" x2="340" y2="164" />
        <line x1="410" y1="296" x2="410" y2="164" />
        <line x1="232" y1="220" x2="232" y2="88" />
        <line x1="302" y1="220" x2="302" y2="88" />
        <line x1="372" y1="220" x2="372" y2="88" />
        <line x1="442" y1="220" x2="442" y2="88" />
        <line x1="512" y1="220" x2="512" y2="88" />
        <line x1="130" y1="296" x2="232" y2="220" />
        <line x1="410" y1="296" x2="512" y2="220" />
        <line x1="130" y1="252" x2="232" y2="176" />
        <line x1="410" y1="252" x2="512" y2="176" />
        <line x1="130" y1="208" x2="232" y2="132" />
        <line x1="410" y1="208" x2="512" y2="132" />
        <line x1="130" y1="164" x2="232" y2="88" />
        <line x1="410" y1="164" x2="512" y2="88" />
      </g>

      <g fill="#93c5fd" opacity="0.82">
        <circle cx="184" cy="284" r="4" />
        <circle cx="208" cy="246" r="4" />
        <circle cx="234" cy="270" r="4" />
        <circle cx="252" cy="228" r="4" />
        <circle cx="276" cy="260" r="4" />
        <circle cx="300" cy="198" r="4" />
        <circle cx="318" cy="240" r="4" />
        <circle cx="342" cy="176" r="4" />
        <circle cx="365" cy="222" r="4" />
        <circle cx="385" cy="156" r="4" />
        <circle cx="410" cy="198" r="4" />
        <circle cx="430" cy="132" r="4" />
        <circle cx="456" cy="184" r="4" />
        <circle cx="474" cy="112" r="4" />
        <circle cx="222" cy="306" r="4" />
        <circle cx="360" cy="286" r="4" />
        <circle cx="492" cy="236" r="4" />
      </g>

      <path d="M190 278 C220 260, 246 240, 276 218" fill="none" stroke="#f97316" stroke-width="2.6" stroke-dasharray="6 5" marker-end="url(#arrow-green)" />
      <rect x="330" y="266" width="214" height="46" rx="6" fill="#ecfdf5" stroke="#86efac" />
      <text x="344" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#166534">Weighted L1 discovery</text>
      <text x="344" y="302" font-family="Arial, sans-serif" font-size="11" fill="#166534">top 20 nearby vectors, then re-rank</text>

      <g filter="url(#soft-shadow)" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
        <circle cx="182" cy="282" r="13" fill="#f97316" stroke="#9a3412" stroke-width="2" />
        <text x="182" y="286" fill="#ffffff">U</text>
        <circle cx="286" cy="214" r="13" fill="#2563eb" stroke="#1e3a8a" stroke-width="2" />
        <text x="286" y="218" fill="#ffffff">1</text>
        <circle cx="364" cy="172" r="13" fill="#2563eb" stroke="#1e3a8a" stroke-width="2" />
        <text x="364" y="176" fill="#ffffff">2</text>
        <circle cx="456" cy="116" r="13" fill="#2563eb" stroke="#1e3a8a" stroke-width="2" />
        <text x="456" y="120" fill="#ffffff">3</text>
        <circle cx="310" cy="304" r="13" fill="#64748b" stroke="#334155" stroke-width="2" />
        <text x="310" y="308" fill="#ffffff">4</text>
      </g>
    </g>

    <g transform="translate(38,450)" font-family="Arial, sans-serif" font-size="12" fill="#334155">
      <text x="0" y="0" font-weight="700" fill="#0f172a">Legend</text>
      <text x="0" y="22"><tspan font-weight="700" fill="#9a3412">U</tspan> User profile</text>
      <text x="140" y="22"><tspan font-weight="700" fill="#1e3a8a">1</tspan> Data Analyst</text>
      <text x="285" y="22"><tspan font-weight="700" fill="#1e3a8a">2</tspan> Data Scientist</text>
      <text x="445" y="22"><tspan font-weight="700" fill="#1e3a8a">3</tspan> ML Engineer</text>
      <text x="0" y="44"><tspan font-weight="700" fill="#334155">4</tspan> Risk Analyst</text>
      <text x="140" y="44" fill="#64748b">Small dots are other dataset role vectors.</text>
    </g>
  </g>

  <g transform="translate(750,116)">
    <rect x="0" y="0" width="300" height="525" rx="10" fill="#ffffff" stroke="#cbd5e1" filter="url(#soft-shadow)" />
    <text x="150" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Inferred Pathway Graph</text>
    <text x="150" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Edges are inferred from skill overlap and policy.</text>

    <line x1="72" y1="132" x2="150" y2="132" stroke="#15803d" stroke-width="3" marker-end="url(#arrow-green)" />
    <line x1="150" y1="132" x2="224" y2="222" stroke="#15803d" stroke-width="3" marker-end="url(#arrow-green)" />
    <line x1="72" y1="132" x2="112" y2="318" stroke="#94a3b8" stroke-width="2.4" stroke-dasharray="6 5" marker-end="url(#arrow-blue)" />
    <line x1="112" y1="318" x2="224" y2="222" stroke="#94a3b8" stroke-width="2.4" stroke-dasharray="6 5" marker-end="url(#arrow-blue)" />

    <g filter="url(#soft-shadow)" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
      <circle cx="72" cy="132" r="25" fill="#f97316" stroke="#9a3412" stroke-width="2" />
      <text x="72" y="136" fill="#ffffff">User</text>
      <circle cx="150" cy="132" r="25" fill="#2563eb" stroke="#1e3a8a" stroke-width="2" />
      <text x="150" y="128" fill="#ffffff">Data</text>
      <text x="150" y="142" fill="#ffffff">Analyst</text>
      <circle cx="224" cy="222" r="25" fill="#2563eb" stroke="#1e3a8a" stroke-width="2" />
      <text x="224" y="218" fill="#ffffff">Data</text>
      <text x="224" y="232" fill="#ffffff">Scientist</text>
      <circle cx="112" cy="318" r="25" fill="#64748b" stroke="#334155" stroke-width="2" />
      <text x="112" y="314" fill="#ffffff">Risk</text>
      <text x="112" y="328" fill="#ffffff">Analyst</text>
    </g>

    <rect x="36" y="410" width="228" height="72" rx="7" fill="#ecfdf5" stroke="#86efac" />
    <text x="54" y="434" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">Suitability re-rank</text>
    <text x="54" y="454" font-family="Arial, sans-serif" font-size="12" fill="#166534">Final ranking uses fit %,</text>
    <text x="54" y="471" font-family="Arial, sans-serif" font-size="12" fill="#166534">gap cost, and matched skills.</text>
  </g>

  <g transform="translate(60,674)">
    <rect x="0" y="0" width="990" height="58" rx="9" fill="#ffffff" stroke="#cbd5e1" />
    <text x="24" y="24" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Disclaimer:</text>
    <text x="100" y="24" font-family="Arial, sans-serif" font-size="13" fill="#334155">The actual vector space has 2,316 skill dimensions. This diagram uses 3 example axes only to illustrate the concept.</text>
    <text x="24" y="44" font-family="Arial, sans-serif" font-size="13" fill="#334155">Vector distance discovers nearby roles. Suitability and gaps judge readiness. The graph is inferred, not an official pathway table.</text>
  </g>
</svg>
